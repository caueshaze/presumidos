services:
  ferrugem-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      DATABASE_PATH: /data/bolao.db
      COOKIE_SECURE: "true"
      REQUIRE_TRUSTED_PROXY: "true"
      TRUSTED_PROXY_CIDRS: 172.31.0.10/32
      RATE_LIMIT_BACKEND: redis
      REDIS_URL: redis://redis:6379
      IP: 0.0.0.0
      PORT: "8080"
      STATIC_DIR: /app/public
    expose:
      - "8080"
    volumes:
      - app_data:/data
    networks:
      origin:
        ipv4_address: 172.31.0.20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      origin:
        ipv4_address: 172.31.0.30

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    depends_on:
      - ferrugem-web
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      public:
      origin:
        ipv4_address: 172.31.0.10

  backup:
    build:
      context: ./deploy/backup
    profiles: ["tools"]
    command: ["/usr/local/bin/backup.sh"]
    volumes:
      - app_data:/data:ro
      - ./backups:/backups:Z

  sqlite-tool:
    build:
      context: ./deploy/backup
    profiles: ["tools"]
    entrypoint: ["sh"]
    volumes:
      - app_data:/data
      - ./backups:/backups:Z

networks:
  public:
  origin:
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/24

volumes:
  app_data:
  caddy_data:
  caddy_config:
  redis_data:
